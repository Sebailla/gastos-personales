# OpenSpec configuration for gastos-personales
# See: openspec/AGENTS.md (project-level) and ~/.pi/agent/gentle-ai/support/sdd-status-contract.md

schema: spec-driven
artifactStore: both # OpenSpec (canonical) + Engram (cross-session index)

# Capabilities tracked under specs/
capabilities:
  - auth
  - accounts
  - transactions
  - fx # foreign exchange
  - snapshots # net worth snapshots
  - reports
  - ui # PWA shell

# Preflight-derived session choices (mirrored from interactive answers)
preflight:
  executionMode: interactive
  chainedPrStrategy: auto-forecast
  reviewBudgetLines: 400

# Strict TDD is opt-in per change. Activated for `auth-foundation` (v2 stack
# is Node + pnpm + Vitest, not Bun). See
# openspec/changes/auth-foundation/tasks.md for the per-task RED → GREEN →
# REFACTOR cycle.
strictTdd:
  enabled: true
  runner: "pnpm test"
  rulesRef: ~/.pi/agent/gentle-ai/support/strict-tdd.md
