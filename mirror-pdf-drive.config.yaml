version: 1

source:
  root: ./Documents-es
  include:
    - "**/*.md"
  exclude: []
  max_depth: 10

output:
  root: ./dist/mirror-pdf-drive
  clean: false

render:
  page_size: A4
  margins:
    top: 2.0
    bottom: 2.0
    left: 2.0
    right: 2.0
  metadata:
    title: gastos-personales (Spanish mirror)
    author: Sebastián Illa

drive:
  root_folder_id: "1_gxtffQs9WendakpXrw_eCSCTj9wQEXG"
  # folder_name: legacy metadata, ignorado por la lógica de upload
  # project_folder_name: opcional, default = Path.cwd().name (gastos-personales)
  conflict_strategy: skip

auth:
  dir: ~/.config/mirror-pdf-drive
  client_secret_file: client_secret.json
  token_file: token.json
